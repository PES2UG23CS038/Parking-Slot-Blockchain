// CONNECT
async function connect() {
    try {
        if (!window.ethereum) {
            alert("Install MetaMask");
            return;
        }

        web3 = new Web3(window.ethereum);

        const chainId = await web3.eth.getChainId();
        if (chainId !== 11155111) {
            alert("Switch to Sepolia network");
            return;
        }

        await window.ethereum.request({ method: 'eth_requestAccounts' });

        const accounts = await web3.eth.getAccounts();
        account = accounts[0];

        document.getElementById("account").innerText = "Connected: " + account;

        contract = new web3.eth.Contract(abi, contractAddress);

        const owner = await contract.methods.owner().call();

        if (account.toLowerCase() === owner.toLowerCase()) {
            document.getElementById("role").innerText = "Role: ADMIN ";
            document.getElementById("addSlotSection").style.display = "block";
        } else {
            document.getElementById("role").innerText = "Role: USER";
            document.getElementById("addSlotSection").style.display = "none";
        }

        document.getElementById("status").innerText = "Connected ";

    } catch (err) {
        alert(err.message);
    }
}

// ADD SLOT
async function addSlot() {
    try {
        document.getElementById("status").innerText = "Processing...";
        await contract.methods.addSlot().send({ from: account });
        document.getElementById("status").innerText = "Slot Added ✅";
    } catch (err) {
        alert(err.message);
    }
}

// RESERVE
async function reserve() {
    try {
        let id = document.getElementById("slotId").value;
        let duration = document.getElementById("duration").value;

        if (!id || !duration) {
            alert("Enter values");
            return;
        }

        let slot = await contract.methods.getSlot(id).call();
        if (slot[1]) {
            alert("Slot already occupied ❌");
            return;
        }

        document.getElementById("status").innerText = "Processing...";
        await contract.methods.reserveSlot(id, duration).send({ from: account });

        document.getElementById("status").innerText = "Reserved ✅";

    } catch (err) {
        alert("Transaction failed ❌");
    }
}

// RELEASE
async function releaseSlot() {
    try {
        let id = document.getElementById("releaseId").value;

        let slot = await contract.methods.getSlot(id).call();
        if (slot[2].toLowerCase() !== account.toLowerCase()) {
            alert("Not your slot ❌");
            return;
        }

        document.getElementById("status").innerText = "Processing...";
        await contract.methods.releaseSlot(id).send({ from: account });

        document.getElementById("status").innerText = "Released ✅";

    } catch (err) {
        alert("Transaction failed ❌");
    }
}

// AVAILABLE
async function getAvailable() {
    let slots = await contract.methods.getAvailableSlots().call();
    document.getElementById("slots").innerText =
        "Available: " + (slots.length ? slots.join(", ") : "None");
}

// FORMAT TIME
function formatTime(ts) {
    return new Date(ts * 1000).toLocaleString();
}

// SLOT DETAILS
async function getSlotDetails() {
    let id = document.getElementById("checkSlotId").value;
    let s = await contract.methods.getSlot(id).call();

    document.getElementById("slotDetails").innerText =
        `Slot: ${s[0]}
Occupied: ${s[1]}
User: ${s[2]}
Start: ${formatTime(s[3])}
End: ${formatTime(s[4])}`;
}

// ALL SLOTS
async function getAll() {
    let slots = await contract.methods.getAllSlots().call();

    let out = "";
    slots.forEach(s => {
        out += `Slot ${s.id} | Occupied: ${s.isOccupied} | User: ${s.currentUser}\n`;
    });

    document.getElementById("allSlots").innerText = out;
}

// HISTORY BY INDEX
async function getHistory() {
    let i = document.getElementById("historyIndex").value;
    let h = await contract.methods.reservationHistory(i).call();

    document.getElementById("history").innerText =
        `Slot: ${h.slotId}
User: ${h.user}
Start: ${formatTime(h.startTime)}
End: ${formatTime(h.endTime)}`;
}

// FULL HISTORY
async function getAllHistory() {
    try {
        const history = await contract.methods.getAllReservations().call();

        if (history.length === 0) {
            document.getElementById("allHistory").innerText = "No reservations yet";
            return;
        }

        let output = "";

        history.forEach((h, index) => {
            output += `#${index + 1}
Slot: ${h.slotId}
User: ${h.user}
Start: ${formatTime(h.startTime)}
End: ${formatTime(h.endTime)}
--------------------------\n`;
        });

        document.getElementById("allHistory").innerText = output;

    } catch (err) {
        alert("Error fetching history");
    }
}

// USER COUNT

    let c = await contract.methods.userReservationsCount(account).call();
    document.getElementById("userCount").innerText = "Reservations: " + c;
}
